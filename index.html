<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dr. Nkululeko Zungu</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background-color: #0b0c10;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container {
      max-width: 600px;
      animation: fadeIn 1.2s ease forwards;
    }

    img {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid #ffffff;
      margin-bottom: 20px;
      animation: fadeIn 1.2s ease forwards;
    }

    h1 {
      font-size: 2.2em;
      margin: 10px 0;
      letter-spacing: 1px;
      color: #f0f0f0;
      animation: fadeIn 1.2s ease forwards;
    }

    p {
      font-size: 1.1em;
      color: #c5c6c7;
      animation: fadeIn 1.2s ease forwards;
    }
  </style>
</head>
<body>

  <!-- Welcome section -->
  <div class="container">
    <img src="IMG_9116.jpeg" alt="Portrait of Dr. Nkululeko Zungu">
    <h1>Dr. Nkululeko Zungu</h1>
    <p>Composer • Performer • Researcher</p>
  </div>

</body>
</html>
